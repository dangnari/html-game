<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>네모의 우주가기 모험!</title>
    <style>
        body {
            margin: 0; overflow: hidden; background: #1a1a1a; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: white; font-family: 'Malgun Gothic', 'sans-serif';
            user-select: none;
        }
        canvas { background: #2c3e50; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); }
        .info {
            position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); 
            padding: 15px; border-radius: 8px; border: 1px solid #444; line-height: 1.6; min-width: 180px;
        }
        .high-score { color: #f1c40f; font-weight: bold; border-top: 1px solid #444; margin-top: 5px; padding-top: 5px; }
        .power-container {
            position: absolute; bottom: 30px; width: 400px; height: 10px;
            background: #444; border-radius: 5px; overflow: hidden; border: 1px solid #666;
        }
        #powerBar { width: 0%; height: 100%; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); transition: width 0.05s linear; }
        #nameInputOverlay {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); padding: 30px; border-radius: 15px; border: 2px solid #f1c40f;
            text-align: center; z-index: 10;
        }
        #nameInputOverlay input { padding: 10px; font-size: 1.2rem; width: 200px; margin-top: 15px; border-radius: 5px; border: none; outline: none; }
        #nameInputOverlay button { padding: 10px 20px; font-size: 1rem; background: #f1c40f; border: none; cursor: pointer; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info">
        <div>현재 높이: <span id="currentScore">0m</span></div>
        <div class="high-score">
            👑 최고 기록: <span id="bestScore">0m</span><br>
            <small id="bestNameDisplay" style="color:#ddd;">기록자: 없음</small>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="power-container">
        <div id="powerBar"></div>
    </div>

    <div id="nameInputOverlay">
        <h2 style="color: #f1c40f; margin-top:0;">와 신기록 어캐했노!</h2>
        <p>기록할 이름 넣으삼.</p>
        <input type="text" id="nicknameInput" maxlength="8" placeholder="최대 8자">
        <br>
        <button id="saveBtn">기록 저장</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // 성능 최적화: 알파 채널 비활성화
        const powerBar = document.getElementById('powerBar');
        const currentScoreElem = document.getElementById('currentScore');
        const bestScoreElem = document.getElementById('bestScore');
        const bestNameDisplay = document.getElementById('bestNameDisplay');
        const nameInputOverlay = document.getElementById('nameInputOverlay');
        const nicknameInput = document.getElementById('nicknameInput');
        const saveBtn = document.getElementById('saveBtn');

        const config = {
            gravity: 0.28,
            friction: 0.7,
            maxPower: 16,
            jumpFactor: 1.1,
            scrollThreshold: 300,
            platformGap: 120
        };

        let player, platforms, score, bestScore, bestName, keys, isGameOver, waitingForName;

        function loadData() {
            bestScore = parseInt(localStorage.getItem('jumpKingBestScore')) || 0;
            bestName = localStorage.getItem('jumpKingBestName') || "없음";
            bestScoreElem.innerText = `${bestScore}m`;
            bestNameDisplay.innerText = `기록자: ${bestName}`;
        }

        function init() {
            player = {
                x: 185, y: 550, width: 30, height: 30,
                vx: 0, vy: 0, isJumping: false, charging: false, power: 0
            };
            platforms = [{ x: 0, y: 580, w: 400, h: 20 }];
            score = 0;
            keys = {};
            isGameOver = false;
            waitingForName = false;
            nameInputOverlay.style.display = 'none';

            for(let i = 0; i < 6; i++) spawnPlatform(500 - (i * config.platformGap));
            currentScoreElem.innerText = `0m`;
            loadData();
        }

        function spawnPlatform(yValue) {
            const width = 60 + Math.random() * 70;
            const x = Math.random() * (canvas.width - width);
            platforms.push({ x, y: yValue, w: width, h: 15 });
        }

        // 입력 최적화
        window.addEventListener('keydown', (e) => {
            if (waitingForName) return;
            if (isGameOver && e.code === 'Enter') { init(); return; }
            if (e.code === 'Space') {
                e.preventDefault(); // 스크롤 방지
                if (!player.isJumping) player.charging = true;
            }
            keys[e.code] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && player.charging) {
                launch();
            }
            keys[e.code] = false;
        });

        function launch() {
            player.vy = -player.power * config.jumpFactor;
            player.vx = (keys['ArrowLeft'] ? -1 : keys['ArrowRight'] ? 1 : 0) * (player.power * 0.4);
            player.isJumping = true;
            player.charging = false;
            player.power = 0;
        }

        saveBtn.onclick = () => {
            const newName = nicknameInput.value.trim() || "익명";
            localStorage.setItem('jumpKingBestScore', score);
            localStorage.setItem('jumpKingBestName', newName);
            loadData();
            init();
        };

        function update() {
            if (isGameOver || waitingForName) return;

            if (player.charging) {
                player.power = Math.min(player.power + 0.25, config.maxPower);
                powerBar.style.width = (player.power / config.maxPower) * 100 + '%';
            } else {
                powerBar.style.width = '0%';
            }

            if (player.isJumping) {
                player.vy += config.gravity;
                player.x += player.vx;
                player.y += player.vy;

                // 벽 충돌
                if (player.x <= 0 || player.x + player.width >= canvas.width) {
                    player.vx *= -config.friction;
                    player.x = player.x <= 0 ? 0 : canvas.width - player.width;
                }
            }

            // 카메라 스크롤 최적화
            if (player.y < config.scrollThreshold) {
                let diff = config.scrollThreshold - player.y;
                player.y += diff;
                for (let i = 0; i < platforms.length; i++) {
                    platforms[i].y += diff;
                }
                score += Math.round(diff / 10);
                currentScoreElem.innerText = `${score}m`;
            }

            // 플랫폼 재활용 로직 (메모리 관리)
            if (platforms[0].y > canvas.height + 100) platforms.shift();
            while (platforms[platforms.length - 1].y > -100) {
                spawnPlatform(platforms[platforms.length - 1].y - config.platformGap);
            }

            // 충돌 판정
            let wasOnPlatform = false;
            if (player.vy >= 0) { // 내려올 때만 검사
                for (let p of platforms) {
                    if (player.x + player.width > p.x && player.x < p.x + p.w &&
                        player.y + player.height > p.y && player.y + player.height < p.y + p.h + player.vy) {
                        player.isJumping = false;
                        player.vy = 0; player.vx = 0;
                        player.y = p.y - player.height;
                        wasOnPlatform = true;
                        break;
                    }
                }
            }
            if (!wasOnPlatform && !player.charging) player.isJumping = true;

            // 사망 판정
            if (player.y > canvas.height) {
                if (score > bestScore && score > 0) {
                    waitingForName = true;
                    nameInputOverlay.style.display = 'block';
                    nicknameInput.focus();
                } else {
                    isGameOver = true;
                }
            }
        }

        function draw() {
            // 배경 칠하기
            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 발판 그리기 (동일 색상 묶어서 처리)
            ctx.fillStyle = "#7f8c8d";
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.w, p.h);
            }

            // 플레이어 차징 색상 계산
            let playerColor = "#3498db"; 
            if (player.charging) {
                const ratio = player.power / config.maxPower;
                const r = Math.floor(241 + (231 - 241) * ratio);
                const g = Math.floor(196 + (76 - 196) * ratio);
                const b = Math.floor(15 + (60 - 15) * ratio);
                playerColor = `rgb(${r}, ${g}, ${b})`;
            }

            let shake = player.charging ? (Math.random() - 0.5) * 4 : 0;
            ctx.fillStyle = playerColor;
            ctx.fillRect(player.x + shake, player.y + shake, player.width, player.height);
            
            // 눈 그리기
            ctx.fillStyle = "white";
            let eyeX = (keys['ArrowLeft'] ? -4 : (keys['ArrowRight'] ? 4 : 0));
            ctx.fillRect(player.x + 8 + eyeX + shake, player.y + 8 + shake, 5, 5);
            ctx.fillRect(player.x + 18 + eyeX + shake, player.y + 8 + shake, 5, 5);

            // 게임 오버 화면
            if (isGameOver && !waitingForName) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = "center";
                
                ctx.fillStyle = "white";
                ctx.font = "bold 70px 'Malgun Gothic'";
                ctx.fillText("병신새끼", canvas.width/2, canvas.height/2 - 40);
                
                ctx.fillStyle = "#e74c3c";
                ctx.font = "bold 20px 'Malgun Gothic'";
                ctx.fillText("갓 태어난 아기가 너보단 잘하겠다 와", canvas.width/2, canvas.height/2 + 10);
                
                ctx.fillStyle = "white";
                ctx.font = "bold 16px 'Malgun Gothic'";
                ctx.fillText("Enter 눌러서 다시하기", canvas.width/2, canvas.height/2 + 60);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        init();
        loop();
    </script>
</body>
</html>
